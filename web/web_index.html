<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <!-- iOS web-app compatibility -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="अक्षर Akshar">

  <!-- Viewport: safe-area for notched iPhones -->
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0,
             viewport-fit=cover,
             user-scalable=no">

  <!-- Theme -->
  <meta name="theme-color" content="#1A0F08">

  <title>अक्षर · Akshar</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icons/Icon-192.png">

  <!-- iOS touch icons -->
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/Icon-192.png">

  <style>
    html, body {
      background-color: #1A0F08;
      height: 100%;
      margin: 0;
      padding: 0;
      /* Prevent iOS bounce/overscroll */
      overscroll-behavior: none;
      -webkit-overflow-scrolling: touch;
    }
    /* Hide the Flutter loading indicator */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: #CDB885;
      font-family: serif;
      font-size: 2rem;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <div class="loading" id="loading">अक्षर</div>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      document.getElementById('loading').style.display = 'none';
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
